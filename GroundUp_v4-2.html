<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroundUp — Retail Feasibility Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0c09;--surface:#1a1710;--surface2:#221f14;--surface3:#2a261a;
    --border:#3a3420;--border2:#4a4228;
    --gold:#c8972a;--gold2:#e8b84b;
    --green:#4caf7d;--green2:#6fcf97;--red:#e05c5c;--blue:#5ba3d9;
    --text:#f0e8d8;--text2:#b0a080;--text3:#6a5c40;--white:#fff8ee;
  }
  html{scroll-behavior:smooth}
  html,body,#root{min-height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif}
  body{overflow-x:hidden}
  input,select{color-scheme:dark;font-family:'Source Sans 3',sans-serif}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
  input[type=number]{-moz-appearance:textfield}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes dashIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes popIn{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  @keyframes galvBadge{0%{transform:scale(.95);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--gold2);outline-offset:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIG ──────────────────────────────────────────────────────
const GOOGLE_MAPS_API_KEY = "AIzaSyCdSZzP0S7Wop28Yw0cy_nzyo0JvzqtB1w";
const SUPABASE_URL      = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
const USE_CLOUD = SUPABASE_URL !== "YOUR_SUPABASE_URL";

// Galveston County FIPS — hardcoded for reliable local demo
const GALV_STATE  = "48";
const GALV_COUNTY = "167";
const GALV_CITIES = ["galveston","league city","friendswood","texas city","la marque","dickinson","santa fe","kemah","seabrook","clear lake shores","bolivar","jamaica beach"];

// ── Helpers ─────────────────────────────────────────────────────
const fmt  = n => Number(n).toLocaleString("en-US");
const fmtM = n => "$"+(n/1e6).toFixed(2)+"M";
const fmtK = n => n>=1e6?fmtM(n):n>=1000?"$"+(n/1e3).toFixed(0)+"K":"$"+Math.round(n);
const clamp= (v,a,b) => Math.min(Math.max(v,a),b);

// ── Session cookie ───────────────────────────────────────────────
function getOrCreateSessionId(){
  const m = document.cookie.match(/(^| )groundup_sid=([^;]+)/);
  if(m) return m[2];
  const id = "u_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
  document.cookie = `groundup_sid=${id}; expires=${new Date(Date.now()+365*864e5).toUTCString()}; path=/; SameSite=Lax`;
  return id;
}

// ── Storage ──────────────────────────────────────────────────────
const LOCAL_KEY = "groundup_deals_v4";
async function loadDeals(sid){
  if(USE_CLOUD){try{const r=await fetch(`${SUPABASE_URL}/rest/v1/deals?session_id=eq.${sid}&order=created_at.desc`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});if(r.ok){const rows=await r.json();return rows.map(r=>({...r.data,id:r.id,savedAt:r.created_at}));}}catch{}}
  try{return JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]");}catch{return[];}
}
async function saveDeal(sid,deal){
  if(USE_CLOUD){try{await fetch(`${SUPABASE_URL}/rest/v1/deals`,{method:"POST",headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({session_id:sid,data:deal})});return;}catch{}}
  const ex=JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]");
  localStorage.setItem(LOCAL_KEY,JSON.stringify([...ex,deal]));
}
async function deleteDeal(sid,id){
  if(USE_CLOUD){try{await fetch(`${SUPABASE_URL}/rest/v1/deals?id=eq.${id}&session_id=eq.${sid}`,{method:"DELETE",headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});return;}catch{}}
  const ex=JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]");
  localStorage.setItem(LOCAL_KEY,JSON.stringify(ex.filter(d=>d.id!==id)));
}

// ── Galveston detection ─────────────────────────────────────────
function isGalveston(address){
  const a = (address||"").toLowerCase();
  return GALV_CITIES.some(c=>a.includes(c));
}

// ── Census data fetch ────────────────────────────────────────────
async function fetchMarketData(address){
  const out={census:null,errors:[],galveston:false};
  let sf=GALV_STATE, cf=GALV_COUNTY, countyName="Galveston County, TX";
  out.galveston = isGalveston(address);

  if(!out.galveston){
    try{
      const gr=await fetch(`https://geocoding.geo.census.gov/geocoder/locations/onelineaddress?address=${encodeURIComponent(address)}&benchmark=Public_AR_Current&format=json`);
      const gd=await gr.json();
      const match=gd?.result?.addressMatches?.[0];
      if(match){
        const{x:lon,y:lat}=match.coordinates;
        const fr=await fetch(`https://geocoding.geo.census.gov/geocoder/geographies/coordinates?x=${lon}&y=${lat}&benchmark=Public_AR_Current&vintage=Current_Current&layers=Counties&format=json`);
        const fd=await fr.json();
        const co=fd?.result?.geographies?.Counties?.[0];
        if(co){sf=co.STATE;cf=co.COUNTY;countyName=co.NAME;}
      }
    }catch{out.errors.push("geocoding");}
  }

  try{
    const ar=await fetch(`https://api.census.gov/data/2022/acs/acs5?get=B19013_001E,B01003_001E,B08303_001E,B25064_001E,B23025_005E&for=county:${cf}&in=state:${sf}`);
    const ad=await ar.json();
    if(ad?.[1]){
      const pop=parseInt(ad[1][1])||null;
      const unemp=parseInt(ad[1][4])||null;
      out.census={
        medianIncome:parseInt(ad[1][0])||null,
        population:pop,
        commuteTime:parseInt(ad[1][2])||null,
        medianRent:parseInt(ad[1][3])||null,
        unemployed:unemp,
        unempRate:pop&&unemp?(unemp/pop*100).toFixed(1):null,
        county:countyName,
      };
    }
  }catch{out.errors.push("acs");}
  return out;
}

// ── Financial model ─────────────────────────────────────────────
function calcMetrics(form,md){
  const price=parseFloat(form.price)||3500000;
  const sqft=parseInt(form.sqft)||18000;
  const anchorPct=clamp(parseFloat(form.anchorPct)||40,0,90);
  const vacancy=clamp(parseFloat(form.vacancy)||8,0,50);
  const capRateExit=parseFloat(form.capRateExit)||6.5;
  const holdYears=parseInt(form.holdYears)||5;
  const ltv=parseFloat(form.ltv)||65;
  const rate=parseFloat(form.interestRate)||6.8;
  const income=md?.census?.medianIncome||72000;
  const baseRent=clamp(Math.round(income/1000)*1.2,12,60);
  const anchorRent=baseRent*0.72, inlineRent=baseRent*1.35;
  const anchorSF=sqft*anchorPct/100;
  const inlineSF=sqft*(1-anchorPct/100)*(1-vacancy/100);
  const grossIncome=(anchorSF*anchorRent)+(inlineSF*inlineRent);
  const noi=grossIncome*0.92;
  const value=noi/(capRateExit/100);
  const loanAmt=price*ltv/100;
  const mRate=rate/100/12,n=360;
  const monthDS=loanAmt*(mRate*Math.pow(1+mRate,n))/(Math.pow(1+mRate,n)-1);
  const annDS=monthDS*12, dscr=noi/annDS;
  const equity=price*(1-ltv/100), cashFlow=noi-annDS, coc=cashFlow/equity*100;
  const exitVal=value*Math.pow(1.02,holdYears);
  const exitEq=exitVal-(loanAmt*0.88);
  const totalRet=(exitEq-equity+cashFlow*holdYears)/equity;
  const irr=(Math.pow(1+totalRet,1/holdYears)-1)*100;
  const pricePerSF=price/sqft, goingInCap=noi/price*100;
  const feasible=irr>=12&&dscr>=1.2;
  return{price,sqft,anchorSF:Math.round(anchorSF),inlineSF:Math.round(inlineSF),
    anchorRent:anchorRent.toFixed(2),inlineRent:inlineRent.toFixed(2),baseRent:baseRent.toFixed(2),
    grossIncome:Math.round(grossIncome),noi:Math.round(noi),loanAmt:Math.round(loanAmt),
    annDS:Math.round(annDS),dscr:dscr.toFixed(2),cashFlow:Math.round(cashFlow),
    coc:coc.toFixed(1),irr:irr.toFixed(1),pricePerSF:pricePerSF.toFixed(0),
    goingInCap:goingInCap.toFixed(1),equity:Math.round(equity),holdYears,feasible,exitVal:Math.round(exitVal)};
}

// ── UI Atoms ────────────────────────────────────────────────────
function Spinner({size=14,color="var(--gold)"}){
  return <div style={{width:size,height:size,border:`2px solid ${color}44`,borderTopColor:color,borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;
}
function Counter({target,decimals=1,running}){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    if(!running){setVal(0);return;}
    let s=null;
    const tick=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/2000,1);setVal(+(( 1-Math.pow(1-p,3))*target).toFixed(decimals));if(p<1)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  },[running,target]);
  return<span>{val.toFixed(decimals)}</span>;
}
const iStyle={width:"100%",background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:8,padding:"11px 14px",fontFamily:"'Source Sans 3',sans-serif",fontSize:16,color:"var(--white)",outline:"none",transition:"border-color .2s,box-shadow .2s"};
const onF=e=>{e.target.style.borderColor="var(--gold)";e.target.style.boxShadow="0 0 0 3px rgba(200,151,42,.15)";};
const onB=e=>{e.target.style.borderColor="var(--border2)";e.target.style.boxShadow="none";};

function Field({label,hint,children}){
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <label style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,color:"var(--text2)",letterSpacing:".04em",textTransform:"uppercase"}}>{label}</label>
        {hint&&<span style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function SectionHead({dot,title,sub}){

    <div style={{marginBottom:18,paddingBottom:12,borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:dot,flexShrink:0}}/>
        <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:17,color:"var(--white)"}}>{title}</span>
      </div>
      {sub&&<div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"var(--text3)",marginTop:4,paddingLeft:18}}>{sub}</div>}
    </div>
  );
}

function MetricRow({label,value,color,note}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid var(--border)"}}>
      <div>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:15,color:"var(--text2)"}}>{label}</div>
        {note&&<div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"var(--text3)",marginTop:1}}>{note}</div>}
      </div>
      <span style={{fontFamily:"'Roboto Mono',monospace",fontSize:16,fontWeight:500,color:color||"var(--white)"}}>{value}</span>
    </div>
  );
}

function BigTile({label,value,color,delay=0}){
  return(
    <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",animation:`fadeUp .4s ${delay}s ease both`}}>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:12,color:"var(--text3)",marginBottom:5,textTransform:"uppercase",letterSpacing:".04em"}}>{label}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:22,color:color||"var(--white)",lineHeight:1}}>{value}</div>
    </div>
  );
}

function TenantBar({anchorPct,vacancy}){
  const inlinePct=100-anchorPct, occ=inlinePct*(1-vacancy/100), vac=inlinePct*(vacancy/100);
  return(
    <div>
      <div style={{display:"flex",height:22,borderRadius:8,overflow:"hidden",gap:2}}>
        <div style={{width:anchorPct+"%",background:"var(--gold)",display:"flex",alignItems:"center",justifyContent:"center",transition:"width .6s ease"}}>
          {anchorPct>12&&<span style={{fontFamily:"'Roboto Mono',monospace",fontSize:10,color:"#000",fontWeight:500}}>{anchorPct.toFixed(0)}%</span>}
        </div>
        <div style={{width:occ+"%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",transition:"width .6s ease"}}>
          {occ>12&&<span style={{fontFamily:"'Roboto Mono',monospace",fontSize:10,color:"#fff",fontWeight:500}}>{occ.toFixed(0)}%</span>}
        </div>
        <div style={{width:vac+"%",background:"var(--surface3)",transition:"width .6s ease"}}/>
      </div>
      <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
        {[["Anchor Tenant","var(--gold)"],["Inline Tenants","var(--blue)"],["Vacancy","var(--text3)"]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:3,background:c,flexShrink:0}}/>
            <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"var(--text2)"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function StepBar({step}){
  return(
    <div style={{display:"flex",alignItems:"center",marginBottom:28,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"4px",overflow:"hidden"}}>
      {["Property Details","Market Data","Results"].map((s,i)=>{
        const active=step===i+1,done=step>i+1;
        return(
          <div key={s} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px 8px",borderRadius:9,background:active?"var(--gold)":done?"var(--surface3)":"transparent",transition:"background .3s"}}>
            <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Roboto Mono',monospace",fontWeight:500,fontSize:12,background:active?"rgba(0,0,0,.2)":done?"var(--green)":"var(--surface3)",color:active?"#000":done?"#000":"var(--text3)",flexShrink:0,transition:"all .3s"}}>{done?"✓":i+1}</div>
            <span style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:14,color:active?"#000":done?"var(--text2)":"var(--text3)",whiteSpace:"nowrap"}}>{s}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Property Map with Places API extras ────────────────────────
function PropertyMap({address,confirmed}){
  const hasKey=GOOGLE_MAPS_API_KEY&&GOOGLE_MAPS_API_KEY!=="YOUR_GOOGLE_MAPS_API_KEY";
  const enc=encodeURIComponent(address||"Galveston County, Texas");

  if(!hasKey||!confirmed){
    return(
      <div style={{height:280,borderRadius:10,background:"var(--surface2)",border:"1px solid var(--border)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,textAlign:"center",padding:20}}>
        <div style={{fontSize:32}}>🗺️</div>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:14,color:"var(--text2)"}}>
          {!confirmed?"Enter address above and click Show Map":"Add Google Maps API key to enable"}
        </div>
      </div>
    );
  }

  // Two maps stacked: satellite + street view side by side
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {/* Satellite view */}
      <div style={{position:"relative",borderRadius:10,overflow:"hidden",border:"1px solid var(--border2)"}}>
        <iframe key={"sat_"+address} width="100%" height="220" style={{border:0,display:"block"}} loading="lazy" allowFullScreen
          src={`https://www.google.com/maps/embed/v1/place?key=${GOOGLE_MAPS_API_KEY}&q=${enc}&maptype=satellite&zoom=18`}
        />
        <div style={{position:"absolute",bottom:8,left:8,background:"rgba(14,12,9,.88)",borderRadius:6,padding:"4px 10px",fontFamily:"'Roboto Mono',monospace",fontSize:9,color:"var(--gold)",letterSpacing:".06em"}}>SATELLITE VIEW</div>
      </div>
      {/* Street view */}
      <div style={{position:"relative",borderRadius:10,overflow:"hidden",border:"1px solid var(--border2)"}}>
        <iframe key={"sv_"+address} width="100%" height="160" style={{border:0,display:"block"}} loading="lazy" allowFullScreen
          src={`https://www.google.com/maps/embed/v1/streetview?key=${GOOGLE_MAPS_API_KEY}&location=${enc}&heading=0&pitch=0&fov=90`}
        />
        <div style={{position:"absolute",bottom:8,left:8,background:"rgba(14,12,9,.88)",borderRadius:6,padding:"4px 10px",fontFamily:"'Roboto Mono',monospace",fontSize:9,color:"var(--blue)",letterSpacing:".06em"}}>STREET VIEW</div>
      </div>
      {/* Google Maps link for full parcel/property lines */}
      <a href={`https://www.google.com/maps/search/${enc}`} target="_blank" rel="noopener" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"8px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--surface2)",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:12,color:"var(--text2)",textDecoration:"none",transition:"all .2s"}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.color="var(--gold)";}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--text2)";}}
      >
        🔗 Open in Google Maps for full parcel lines &amp; property details ↗
      </a>
    </div>
  );
}

// ── Dashboard ───────────────────────────────────────────────────
function Dashboard({deals,onDelete,sessionId,loading}){
  if(loading) return <div style={{maxWidth:700,margin:"80px auto",textAlign:"center"}}><Spinner size={32}/><div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:15,color:"var(--text3)",marginTop:16}}>Loading your saved deals...</div></div>;

      <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:22,color:"var(--text2)",marginBottom:8}}>No Saved Deals Yet</div>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:15,color:"var(--text3)",lineHeight:1.7}}>Run a feasibility analysis, then click <strong style={{color:"var(--gold)"}}>Save This Deal</strong> to compare properties here.<br/>{USE_CLOUD?"Deals sync across all your devices automatically.":"Deals are saved to this browser and will be here next visit."}</div>
    </div>
  );
  const best=deals.reduce((a,b)=>parseFloat(a.metrics?.irr||0)>parseFloat(b.metrics?.irr||0)?a:b,deals[0]);
  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 32px 60px",animation:"fadeUp .4s ease"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:"'Roboto Mono',monospace",fontSize:11,letterSpacing:".12em",color:"var(--gold)",marginBottom:8}}>SAVED DEALS</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:26,color:"var(--white)"}}>Deal Comparison</h2>
        <p style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:15,color:"var(--text2)",marginTop:4}}>{deals.length} saved {deals.length===1?"property":"properties"} · {USE_CLOUD?"synced to cloud":"stored in this browser"}</p>
      </div>
      {deals.length>1&&(

                ))}

          );
        })}
      </div>
    </div>
  );
}

                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:6}}>{d.label}</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:20,color:d.color,minHeight:28}}>{d.value}</div>
                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"var(--text3)",marginTop:4}}>{d.sub}</div>
                  </div>
                ))}
              </div>
              {marketData?.census&&(
                <div style={{marginTop:14,padding:14,background:"rgba(200,151,42,.06)",border:"1px solid rgba(200,151,42,.2)",borderRadius:10}}>
                  <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,color:"var(--gold)",marginBottom:5}}>Trade Area Signal</div>
                  <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:14,color:"var(--text2)",lineHeight:1.7}}>
                    {marketData.census.medianIncome>75000?"Strong buying power. National and premium tenants will compete for your space.":marketData.census.medianIncome>50000?"Solid mid-market area. Value retail, service tenants, and QSR concepts perform well.":"Value-oriented market. Dollar stores, discount grocers, and essential services perform best."}
                  </div>
                </div>
              )}
            </div>
            <button onClick={runAnalysis} style={{width:"100%",padding:16,borderRadius:12,border:"none",cursor:"pointer",background:"var(--green)",color:"#000",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:16,boxShadow:"0 0 28px rgba(76,175,125,.25)",transition:"all .3s"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--green2)"}
              onMouseLeave={e=>e.currentTarget.style.background="var(--green)"}
            >{fetchSt.done?"Run Feasibility Analysis →":"Skip & Run With Estimates →"}</button>
          </div>
        </div>
      )}

      {/* STEP 3 */}
      {step===3&&(
        <div ref={resRef} style={{animation:"slideIn .35s ease"}}>
          <div style={{padding:"20px 24px",borderRadius:14,border:`2px solid ${m.feasible?"rgba(76,175,125,.4)":"rgba(224,92,92,.35)"}`,background:m.feasible?"rgba(76,175,125,.06)":"rgba(224,92,92,.06)",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:14,color:m.feasible?"var(--green)":"var(--red)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>{m.feasible?"✓  This deal clears the hurdle rate":"⚠  This deal is below the hurdle rate"}</div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:15,color:"var(--text2)",lineHeight:1.7}}>
                {m.feasible?`The projected IRR of ${m.irr}% exceeds the 12% retail minimum by ${(parseFloat(m.irr)-12).toFixed(1)} percentage points. This deal looks attractive.`:`The projected IRR of ${m.irr}% falls short of the 12% retail minimum by ${(12-parseFloat(m.irr)).toFixed(1)} points. Consider renegotiating price or improving the tenant mix.`}
              </div>
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:64,color:m.feasible?"var(--green)":"var(--red)",lineHeight:1}}>
                {done?<Counter target={parseFloat(m.irr)} decimals={1} running={done}/>:"—"}<span style={{fontSize:32}}>%</span>
              </div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:12,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginTop:4}}>Projected IRR</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:16}}>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22}}>
              <SectionHead dot="var(--green)" title="Investment Returns" sub={`${m.holdYears}-year hold period`}/>
              <MetricRow label="IRR (Levered)" value={m.irr+"%"} color={m.feasible?"var(--green)":"var(--red)"} note="Internal Rate of Return"/>
              <MetricRow label="Cash-on-Cash" value={m.coc+"%"} color="var(--gold)" note="Annual cash return on equity"/>
              <MetricRow label="Going-In Cap Rate" value={m.goingInCap+"%"} color="var(--blue)" note="NOI ÷ Purchase Price"/>
              <MetricRow label="Exit Value" value={fmtM(m.exitVal)} note={`Projected at year ${m.holdYears}`}/>
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22}}>
              <SectionHead dot="var(--blue)" title="Debt Structure" sub="Financing assumptions"/>
              <MetricRow label="Loan Amount" value={fmtM(m.loanAmt)} note="Based on LTV entered"/>
              <MetricRow label="Annual Debt Service" value={fmtK(m.annDS)} color="var(--gold)" note="Total mortgage payments/yr"/>
              <MetricRow label="DSCR" value={m.dscr+"×"} color={parseFloat(m.dscr)>=1.25?"var(--green)":"var(--gold)"} note={parseFloat(m.dscr)>=1.25?"Lenders want 1.25× ✓":"Lenders want 1.25× — borderline"}/>
              <MetricRow label="Annual Cash Flow" value={fmtK(m.cashFlow)} color={m.cashFlow>0?"var(--green)":"var(--red)"} note="After all debt service"/>
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22}}>
              <SectionHead dot="var(--gold)" title="Income Analysis" sub="NNN lease structure"/>
              <MetricRow label="Anchor Rent / SF / yr" value={"$"+m.anchorRent} color="var(--gold)" note="Below-market NNN lease"/>
              <MetricRow label="Inline Rent / SF / yr" value={"$"+m.inlineRent} color="var(--blue)" note="Market rate NNN"/>
              <MetricRow label="Gross Income" value={fmtK(m.grossIncome)} note="Before operating reserves"/>
              <MetricRow label="Net Operating Income" value={fmtK(m.noi)} color="var(--green)" note="After 8% mgmt & reserves"/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:16,marginBottom:16}}>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22}}>
              <SectionHead dot="var(--gold)" title="Tenant Mix" sub="Space allocation breakdown"/>
              <TenantBar anchorPct={parseFloat(form.anchorPct)||40} vacancy={parseFloat(form.vacancy)||8}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:16}}>
                <BigTile label="Anchor SF" value={fmt(m.anchorSF)} color="var(--gold)" delay={0}/>
                <BigTile label="Occupied Inline" value={fmt(m.inlineSF)} color="var(--blue)" delay={.05}/>
                <BigTile label="Price / SF" value={"$"+m.pricePerSF} color="var(--text)" delay={.1}/>
              </div>
            </div>
            {marketData?.census?(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22}}>
                <SectionHead dot="var(--gold2)" title="Market Data" sub={marketData.census.county}/>
                <MetricRow label="Median HH Income" value={"$"+fmt(marketData.census.medianIncome)} color="var(--gold)" note="US Census ACS 2022"/>
                <MetricRow label="County Population" value={fmt(marketData.census.population)+" people"} color="var(--blue)" note="US Census ACS 2022"/>
                <MetricRow label="Est. Market Rent" value={"$"+m.baseRent+"/SF/yr NNN"} color="var(--green)" note="Income-derived proxy"/>
                {marketData.census.commuteTime&&<MetricRow label="Avg. Commute" value={marketData.census.commuteTime+" min"} color="var(--text2)" note="Traffic accessibility"/>}
                {marketData.census.unempRate&&<MetricRow label="Unemployment Rate" value={marketData.census.unempRate+"%"} color="var(--text2)" note="County labor market"/>}
              </div>
            ):(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:22,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",gap:12}}>
                <div style={{fontSize:36}}>📡</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:16,color:"var(--text2)"}}>No Live Market Data</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"var(--text3)",lineHeight:1.6}}>Go back to Step 2 and fetch Census data for real numbers.</div>
                <button onClick={()=>setStep(2)} style={{padding:"9px 20px",borderRadius:8,border:"1px solid var(--gold)44",background:"rgba(200,151,42,.08)",color:"var(--gold)",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>Fetch Market Data</button>
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
            <button onClick={handleSave} disabled={saved} style={{padding:16,borderRadius:12,border:`1px solid ${saved?"var(--green)44":"var(--gold)44"}`,background:saved?"rgba(76,175,125,.08)":"rgba(200,151,42,.08)",color:saved?"var(--green)":"var(--gold)",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,cursor:saved?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all .3s"}}
              onMouseEnter={e=>{if(!saved)e.currentTarget.style.background="rgba(200,151,42,.15)";}}
              onMouseLeave={e=>{if(!saved)e.currentTarget.style.background="rgba(200,151,42,.08)";}}
            >{saved?"✓  Saved to Dashboard":"💾  Save This Deal"}</button>
            <button onClick={()=>setStep(1)} style={{padding:16,borderRadius:12,border:"1px solid var(--blue)44",background:"rgba(91,163,217,.08)",color:"var(--blue)",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .3s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(91,163,217,.15)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(91,163,217,.08)"}
            >⚙️  Adjust Assumptions</button>
            <button onClick={()=>setStep(2)} style={{padding:16,borderRadius:12,border:"1px solid var(--green)44",background:"rgba(76,175,125,.08)",color:"var(--green)",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .3s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(76,175,125,.15)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(76,175,125,.08)"}
            >🔄  Re-fetch Market Data</button>
          </div>
        </div>
      )}
    </div>
  );
}
